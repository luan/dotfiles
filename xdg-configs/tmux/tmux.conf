# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

set -s extended-keys on
set -g extended-keys-format csi-u

# Custom CSI sequences from Ghostty relay (must register before binding)
set -s user-keys[0] "\033[60~"   # Ctrl+Tab    → toggle last session
set -s user-keys[1] "\033[61~"   # Cmd+;       → attention session
set -s user-keys[2] "\033[62~"   # Cmd+N       → new project session
set -s user-keys[3] "\033[63~"   # Cmd+P       → session chooser
set -s user-keys[4] "\033[64~"   # Cmd+Shift+N → session next
set -s user-keys[5] "\033[65~"   # Cmd+Shift+P → session prev
set -s user-keys[6] "\033[66~"   # Cmd+Shift+, → session move up
set -s user-keys[7] "\033[67~"   # Cmd+Shift+. → session move down
set -s user-keys[8] "\033[68~"   # Cmd+Ctrl+N  → new worktree
set -s user-keys[9] "\033[69~"   # Ctrl+Alt+[  → copy mode

# Popup styling
set -g @popup_bg '#1A1B26'
set -g @popup_border '#292E42'

# Status bar — fully rendered by tmux-session (Rust)
set -g status-position top
set -g status-style 'bg=default'
set -g status-interval 0     # daemon drives refresh via refresh-client -S

# Feature toggles (set to "0" to disable)
set -g @two_row_status '0'   # two-row layout on notched displays
set -g @sidebar_enabled '1'  # WezTerm Cmd+Shift+E / Cmd+O sidebar

# Start sysinfo daemon (idempotent — no-ops if already running)
run-shell -b "~/.config/tmux/scripts/tmux-session sysinfo-daemon"
# Initial render
run "~/.config/tmux/scripts/tmux-session update '' '#{client_width}'"

# Re-render on session/window/resize events
set-hook -g client-session-changed 'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g session-created        'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g session-closed         'run-shell -b "~/.config/tmux/scripts/tmux-session update \"\" \"#{client_width}\""'
set-hook -g session-renamed        'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g client-resized         'run-shell -b "~/.config/tmux/scripts/tmux-session update \"\" \"#{client_width}\""'
set-hook -g session-window-changed 'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g after-new-window       'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g after-rename-window    'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'
set-hook -g window-unlinked        'run-shell -b "~/.config/tmux/scripts/tmux-session update \"#{client_session}\" \"#{client_width}\""'

# Click handling for status bar ranges (sessions, windows, system)
bind -T root MouseDown1Status      if-shell -F '#{mouse_status_range}' 'run-shell -b "~/.config/tmux/scripts/tmux-session click \"#{mouse_status_range}\""' ''
bind -T root MouseDown1StatusRight if-shell -F '#{mouse_status_range}' 'run-shell -b "~/.config/tmux/scripts/tmux-session click \"#{mouse_status_range}\""' ''

set -gq allow-passthrough on
set -g bell-action any
set -g monitor-bell on
set -g visual-activity off

# Ghostty-compatible terminal configuration
set -g default-terminal "xterm-ghostty"

set-window-option -g window-size smallest

set -g base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard

# Catppuccin Mocha pane borders
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-style 'fg=#45475a'

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection

set -g @fzf-url-fzf-options '--tmux 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set-option -g prefix C-space

bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = choose-buffer -F "#{buffer_size} bytes: #{=60:buffer_sample}"
# Rename session in popup (preserves order)
bind r run-shell -b '~/.config/tmux/scripts/tmux-session picker rename'

# Unprefixed {{{
  bind -n M-\\ setw synchronize-panes
  bind -n M-C send-keys -R \; clear-history

  bind-key -n M-H select-pane -L
  bind-key -n M-J select-pane -D
  bind-key -n M-K select-pane -U
  bind-key -n M-L select-pane -R
  bind-key -n M-O select-pane -t :.+

  bind-key -n M-N     next-window
  bind-key -n M-P     previous-window
  bind-key -n User3 run-shell -b '~/.config/tmux/scripts/tmux-session picker chooser'   # Session chooser (Cmd+P via Ghostty CSI relay)
  bind-key -n User4 run-shell '~/.config/tmux/scripts/tmux-session switch next'  # Session next (Cmd+Shift+N via Ghostty CSI relay)
  bind-key -n User5 run-shell '~/.config/tmux/scripts/tmux-session switch prev'  # Session prev (Cmd+Shift+P via Ghostty CSI relay)
  bind-key -n C-M-[   copy-mode
  bind-key -n User9   copy-mode                                               # Copy mode (Ctrl+Alt+[ via WezTerm CSI relay)
  bind-key -n C-M-]   paste-buffer
  bind-key -n M-X     confirm-before -p "kill-pane #P? (y/n)" kill-pane
  bind-key -n M-Z     resize-pane -Z
  bind-key -n M-Tab   last-window
  bind-key -n User0 switch-client -l                                          # Toggle last session (Ctrl+Tab via Ghostty CSI relay)
  bind-key -n User1 run-shell '~/.config/tmux/scripts/tmux-session attention' # Jump to attention session (Cmd+; via Ghostty CSI relay)
  bind-key -n M-R     source-file ~/.tmux.conf

  # Window selection by index (alt+N)
  bind-key -n M-1 select-window -t :1
  bind-key -n M-2 select-window -t :2
  bind-key -n M-3 select-window -t :3
  bind-key -n M-4 select-window -t :4
  bind-key -n M-5 select-window -t :5
  bind-key -n M-6 select-window -t :6
  bind-key -n M-7 select-window -t :7
  bind-key -n M-8 select-window -t :8
  bind-key -n M-9 select-window -t :9

  # Swap window left/right (Alt+Shift+,/.)
  bind-key -n M-< 'swap-window -t -1; select-window -t -1'
  bind-key -n M-> 'swap-window -t +1; select-window -t +1'

  # Move current session up/down in order (Cmd+Shift+,/. via Ghostty CSI relay)
  bind-key -n User6 run-shell '~/.config/tmux/scripts/tmux-session move up'
  bind-key -n User7 run-shell '~/.config/tmux/scripts/tmux-session move down'

  # New project session (Cmd+N via Ghostty CSI relay)
  bind-key -n User2 run-shell -b '~/.config/tmux/scripts/tmux-session picker new-session'
  # New worktree in current repo (Cmd+Ctrl+N via Ghostty CSI relay)
  bind-key -n User8 run-shell -b '~/.config/tmux/scripts/tmux-session picker new-worktree'

# Ditch session safely (prefix+X, or Cmd+Option+X via ghostty)
bind X run-shell -b '~/.config/tmux/scripts/tmux-session picker ditch'
# Session chooser (prefix+s)
bind s run-shell -b '~/.config/tmux/scripts/tmux-session picker chooser'
# Swap window left/right (prefix+</>)
bind < 'swap-window -t -1; select-window -t -1'
bind > 'swap-window -t +1; select-window -t +1'
# Session selection by index (prefix+N, overrides default window-select)
bind-key 1 run-shell '~/.config/tmux/scripts/tmux-session select 1'
bind-key 2 run-shell '~/.config/tmux/scripts/tmux-session select 2'
bind-key 3 run-shell '~/.config/tmux/scripts/tmux-session select 3'
bind-key 4 run-shell '~/.config/tmux/scripts/tmux-session select 4'
bind-key 5 run-shell '~/.config/tmux/scripts/tmux-session select 5'
bind-key 6 run-shell '~/.config/tmux/scripts/tmux-session select 6'
bind-key 7 run-shell '~/.config/tmux/scripts/tmux-session select 7'
bind-key 8 run-shell '~/.config/tmux/scripts/tmux-session select 8'
bind-key 9 run-shell '~/.config/tmux/scripts/tmux-session select 9'
# }}}

# Mouse mode {{{
  set -g mouse on
  bind   -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
  bind   -n WheelDownPane select-pane -t= \; send-keys -M
  bind   -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
  bind   -T copy-mode-vi C-WheelUpPane   send -X scroll-up
  bind   -T copy-mode-vi C-WheelDownPane send -X scroll-down
  unbind -T copy-mode-vi MouseDragEnd1Pane
  bind   -T copy-mode    C-WheelUpPane   send -X scroll-up
  bind   -T copy-mode    C-WheelDownPane send -X scroll-down
  unbind -T copy-mode    MouseDragEnd1Pane
# }}}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
