# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'

# Inlined from tmux-sensible (removed)
set -g focus-events on

set -s extended-keys on
set -g extended-keys-format csi-u
run-shell "tmux set-environment -g PATH \"$HOME/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin\""

# Custom CSI sequences from WezTerm relay (must register before binding)
set -s user-keys[0] "\033[60~"   # Ctrl+Tab     → toggle last session
set -s user-keys[1] "\033[61~"   # Cmd+;       → attention session
set -s user-keys[2] "\033[62~"   # Cmd+N       → new project session
set -s user-keys[3] "\033[63~"   # Cmd+P       → session chooser
set -s user-keys[4] "\033[64~"   # Cmd+Shift+N → session next
set -s user-keys[5] "\033[65~"   # Cmd+Shift+P → session prev
set -s user-keys[6] "\033[66~"   # Cmd+Shift+, → session move up
set -s user-keys[7] "\033[67~"   # Cmd+Shift+. → session move down
set -s user-keys[8] "\033[68~"   # Cmd+Ctrl+N  → new worktree
set -s user-keys[9] "\033[69~"   # Ctrl+Alt+[  → copy mode
set -s user-keys[10] "\033[70~"  # Cmd+Shift+] → session next (alt)
set -s user-keys[13] "\033[73~"  # Cmd+Shift+[ → session prev (alt)
set -s user-keys[11] "\033[71~"  # Cmd+Y       → copy mode
set -s user-keys[12] "\033[72~"  # Cmd+C       → copy-mode copy selection
set -s user-keys[14] "\033[74~"  # Cmd+Shift+E → tmux-native sidebar toggle
set -s user-keys[15] "\033[75~"  # Cmd+O       → tmux-native sidebar focus
set -s user-keys[16] "\033[76~"  # Ctrl+Shift+Tab → toggle last session

# Popup styling
set -g @popup_bg '#1A1B26'
set -g @popup_border '#292E42'

# Status bar — fully rendered by mux (Rust)
set -g status-position top
set -g status-style 'bg=#11111b'
set -g status-interval 0     # daemon drives refresh via refresh-client -S

# Feature toggles (set to "0" to disable)
set -g @two_row_status '1'   # two-row layout on notched displays
set -g @sidebar_enabled '1'  # Terminal CSI Cmd+Shift+E / Cmd+O sidebar
set -g @sidebar_width '45'
set -g @notch_width '48'
set -g @sidebar_borderless '0'  # tmux border styles are window-scoped, so 1 hides all pane borders in sidebar windows
set -g @sidebar_border_color '#1A1B26'

# Start sysinfo daemon (idempotent — no-ops if already running)
run-shell -b "mux sysinfo-daemon"
# Initial render
run "mux update '' '#{client_width}'"

# Re-render on session/window/resize events
set-hook -g client-session-changed 'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -ag client-session-changed 'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g session-created        'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -ag session-created       'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g session-closed         'run-shell -b "mux update \"\" \"#{client_width}\""'
set-hook -g session-renamed        'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -g client-resized         'run-shell -b "mux update \"\" \"#{client_width}\""'
set-hook -ag client-resized        'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g client-focus-in        'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g session-window-changed 'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -ag session-window-changed 'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g after-new-window       'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -ag after-new-window      'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'
set-hook -g after-rename-window    'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -g window-unlinked        'run-shell -b "mux update \"#{client_session}\" \"#{client_width}\""'
set-hook -g pane-exited            'run-shell -b "mux sidebar prune-orphans"'
set-hook -g after-kill-pane        'run-shell -b "mux sidebar prune-orphans"'
set-hook -g window-resized         'if-shell -F "#{==:#{@sidebar_open},1}" "run-shell -b \"mux sidebar sync\""'

# Click handling for status bar ranges (sessions, windows, system)
bind -T root MouseDown1Status      if-shell -F '#{mouse_status_range}' 'run-shell -b "mux click \"#{mouse_status_range}\""' ''
bind -T root MouseDown1StatusRight if-shell -F '#{mouse_status_range}' 'run-shell -b "mux click \"#{mouse_status_range}\""' ''

set -gq allow-passthrough on
# Do not let tmux native alert/activity state style the status bar.
set -g bell-action none
set -g activity-action none
set -g monitor-bell off
set -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -gw window-status-activity-style default
set -gw window-status-bell-style default

# Terminal: xterm-ghostty terminfo works fine under WezTerm (truecolor + extended keys)
set -g default-terminal "xterm-ghostty"

set-window-option -g window-size smallest

set -g base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard

set -g window-style "bg=#171823"
set -g window-active-style "bg=#1a1b26"

# Catppuccin Mocha pane borders
set -g pane-active-border-style 'bg=#1a1b26 fg=#1a1b26'
set -g pane-border-style 'bg=#1a1b26 fg=#1a1b26'

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection
bind -T copy-mode-vi User12 send -X copy-pipe-and-cancel 'pbcopy'             # Cmd+C → copy to system clipboard

set -g @fzf-url-fzf-options '--tmux 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set-option -g prefix C-space

bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = choose-buffer -F "#{buffer_size} bytes: #{=60:buffer_sample}"
# Rename session in popup (preserves order)
bind r run-shell -b 'mux picker rename'

# Unprefixed {{{
  bind -n M-\\ setw synchronize-panes
  bind -n M-C send-keys -R \; clear-history

  bind-key -n User0 run-shell 'mux last'                         # Toggle last session (Ctrl+Tab via terminal CSI relay)
  bind-key -n M-H select-pane -L
  bind-key -n M-J select-pane -D
  bind-key -n M-K select-pane -U
  bind-key -n M-L select-pane -R
  bind-key -n M-O select-pane -t :.+

  bind-key -n M-N     next-window
  bind-key -n M-P     previous-window
  bind-key -n 'M-}'   next-window                                              # Alt+Shift+] → next window (alt for Alt+Shift+N)
  bind-key -n 'M-{'   previous-window                                          # Alt+Shift+[ → prev window (alt for Alt+Shift+P)
  bind-key -n User3 run-shell -b 'mux picker chooser'   # Session chooser (Cmd+P via WezTerm CSI relay)
  bind-key -n User4 run-shell 'mux switch next'  # Session next (Cmd+Shift+N via WezTerm CSI relay)
  bind-key -n User5 run-shell 'mux switch prev'  # Session prev (Cmd+Shift+P via WezTerm CSI relay)
  bind-key -n User9   copy-mode                                               # Copy mode (Ctrl+Alt+[ via WezTerm CSI relay)
  bind-key -n User10  run-shell 'mux switch next'       # Session next (Cmd+Shift+] via WezTerm CSI relay)
  bind-key -n User13  run-shell 'mux switch prev'       # Session prev (Cmd+Shift+[ via WezTerm CSI relay)
  bind-key -n User11  copy-mode                                                # Copy mode (Cmd+Y via WezTerm CSI relay)
  bind-key -n User14  run-shell 'mux sidebar toggle'    # Sidebar toggle (Cmd+Shift+E via terminal CSI relay)
  bind-key -n User15  run-shell 'mux sidebar focus'     # Sidebar focus (Cmd+O via terminal CSI relay)
  bind-key -n User16  run-shell 'mux last'                       # Toggle last session (Ctrl+Shift+Tab via terminal CSI relay)
  bind-key -n C-M-]   paste-buffer
  bind-key -n M-X     confirm-before -p "kill-pane #P? (y/n)" kill-pane
  bind-key -n M-Z     resize-pane -Z
  bind-key -n M-Tab   last-window
  bind-key -n User1 run-shell 'mux attention' # Jump to attention session (Cmd+; via WezTerm CSI relay)
  bind-key -n M-R     source-file ~/.config/tmux/tmux.conf

  # Window selection by index (alt+N)
  bind-key -n M-1 select-window -t :1
  bind-key -n M-2 select-window -t :2
  bind-key -n M-3 select-window -t :3
  bind-key -n M-4 select-window -t :4
  bind-key -n M-5 select-window -t :5
  bind-key -n M-6 select-window -t :6
  bind-key -n M-7 select-window -t :7
  bind-key -n M-8 select-window -t :8
  bind-key -n M-9 select-window -t :9

  # Swap window left/right (Alt+Shift+,/.)
  bind-key -n M-< 'swap-window -t -1; select-window -t -1'
  bind-key -n M-> 'swap-window -t +1; select-window -t +1'

  # Move current session up/down in order (Cmd+Shift+,/. via WezTerm CSI relay)
  bind-key -n User6 run-shell 'mux move up'
  bind-key -n User7 run-shell 'mux move down'

  # New project session (Cmd+N via WezTerm CSI relay)
  bind-key -n User2 run-shell -b 'mux picker new-session'
  # New worktree in current repo (Cmd+Ctrl+N via WezTerm CSI relay)
  bind-key -n User8 run-shell -b 'mux picker new-worktree'

# Ditch session safely (prefix+X, or Cmd+Option+X via WezTerm)
bind X run-shell -b 'mux picker ditch'
# Session chooser (prefix+s)
bind s run-shell -b 'mux picker chooser'
# Swap window left/right (prefix+</>)
bind < 'swap-window -t -1; select-window -t -1'
bind > 'swap-window -t +1; select-window -t +1'
# Session selection by index (prefix+N, overrides default window-select)
bind-key 1 run-shell 'mux select 1'
bind-key 2 run-shell 'mux select 2'
bind-key 3 run-shell 'mux select 3'
bind-key 4 run-shell 'mux select 4'
bind-key 5 run-shell 'mux select 5'
bind-key 6 run-shell 'mux select 6'
bind-key 7 run-shell 'mux select 7'
bind-key 8 run-shell 'mux select 8'
bind-key 9 run-shell 'mux select 9'
# }}}

# Mouse mode {{{
  set -g mouse on
  bind   -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
  bind   -n WheelDownPane select-pane -t= \; send-keys -M
  bind   -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
  bind   -T copy-mode-vi C-WheelUpPane   send -X scroll-up
  bind   -T copy-mode-vi C-WheelDownPane send -X scroll-down
  unbind -T copy-mode-vi MouseDragEnd1Pane
  bind   -T copy-mode    C-WheelUpPane   send -X scroll-up
  bind   -T copy-mode    C-WheelDownPane send -X scroll-down
  unbind -T copy-mode    MouseDragEnd1Pane
# }}}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
